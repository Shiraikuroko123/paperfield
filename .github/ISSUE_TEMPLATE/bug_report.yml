name: Bug report
description: Report a reproducible Paperfield problem
title: "[Bug] "
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Problem
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      placeholder: "1. Open...\n2. Select...\n3. Observe..."
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: Windows 11, Python 3.10, Edge 150
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Remove API keys and private paper notes before posting.
