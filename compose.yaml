services:
  paperfield:
    build: .
    ports:
      - "8765:8765"
    environment:
      PAPERFIELD_HOST: 0.0.0.0
      PAPERFIELD_PORT: 8765
      PAPERFIELD_DATA_DIR: /data
      PAPERFIELD_AUTO_REFRESH: 1
      PAPERFIELD_OPENAI_API_KEY: ${PAPERFIELD_OPENAI_API_KEY:-}
      PAPERFIELD_OPENAI_BASE_URL: ${PAPERFIELD_OPENAI_BASE_URL:-https://api.openai.com/v1}
      PAPERFIELD_OPENAI_MODEL: ${PAPERFIELD_OPENAI_MODEL:-gpt-5-mini}
      PAPERFIELD_TRANSLATE_ENDPOINT: ${PAPERFIELD_TRANSLATE_ENDPOINT:-}
      PAPERFIELD_TRANSLATE_API_KEY: ${PAPERFIELD_TRANSLATE_API_KEY:-}
      PAPERFIELD_S3_PROVIDER: ${PAPERFIELD_S3_PROVIDER:-S3 compatible storage}
      PAPERFIELD_S3_ENDPOINT: ${PAPERFIELD_S3_ENDPOINT:-}
      PAPERFIELD_S3_REGION: ${PAPERFIELD_S3_REGION:-auto}
      PAPERFIELD_S3_BUCKET: ${PAPERFIELD_S3_BUCKET:-}
      PAPERFIELD_S3_ACCESS_KEY_ID: ${PAPERFIELD_S3_ACCESS_KEY_ID:-}
      PAPERFIELD_S3_SECRET_ACCESS_KEY: ${PAPERFIELD_S3_SECRET_ACCESS_KEY:-}
      PAPERFIELD_LOCAL_CACHE_MAX_MB: ${PAPERFIELD_LOCAL_CACHE_MAX_MB:-2048}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    volumes:
      - paperfield-data:/data
    restart: unless-stopped

volumes:
  paperfield-data:
