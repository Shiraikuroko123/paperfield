<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Paperfield 内测账户登录">
  <title>登录 · Paperfield</title>
  <link rel="stylesheet" href="/login.css">
</head>
<body>
  <main class="login-shell">
    <section class="login-identity" aria-labelledby="brandName">
      <div class="brand-mark" aria-hidden="true">P</div>
      <div>
        <p>研究工作台</p>
        <h1 id="brandName">Paperfield</h1>
      </div>
      <span>Private beta</span>
    </section>

    <section class="login-panel" aria-labelledby="loginTitle">
      <div class="login-heading">
        <p>内测访问</p>
        <h2 id="loginTitle">登录你的账户</h2>
      </div>
      <form id="loginForm">
        <label>
          <span>用户名</span>
          <input id="username" name="username" type="text" autocomplete="username" autocapitalize="none" spellcheck="false" required maxlength="32">
        </label>
        <label>
          <span>密码</span>
          <div class="password-field">
            <input id="password" name="password" type="password" autocomplete="current-password" required maxlength="128">
            <button id="togglePassword" type="button" aria-label="显示密码">显示</button>
          </div>
        </label>
        <p class="login-error" id="loginError" role="alert" hidden></p>
        <button class="login-submit" id="loginSubmit" type="submit">登录</button>
      </form>
      <p class="login-footnote">账户由 Paperfield 管理员发放</p>
    </section>
  </main>
  <script src="/login.js?v=0.12.7-compat3" defer></script>
</body>
</html>
